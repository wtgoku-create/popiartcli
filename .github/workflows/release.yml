name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      HOMEBREW_POPI_GITHUB_TOKEN: ${{ secrets.HOMEBREW_POPI_GITHUB_TOKEN }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve GoReleaser args
        id: goreleaser_args
        run: |
          if [ -z "${HOMEBREW_POPI_GITHUB_TOKEN}" ]; then
            echo "args=release --clean --skip=homebrew" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_POPI_GITHUB_TOKEN is not configured; publishing GitHub release without Homebrew tap update."
          else
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: ${{ steps.goreleaser_args.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_POPI_GITHUB_TOKEN: ${{ secrets.HOMEBREW_POPI_GITHUB_TOKEN }}
